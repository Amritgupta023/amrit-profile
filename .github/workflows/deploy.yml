name: Build and Deploy React App

on:
  push:
    branches:
      - master

concurrency:
  group: production-deployment
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build and deploy to EC2
    runs-on: ubuntu-latest

    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci


      - name: Build React application
        run: npm run build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload build to temporary directory
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$EC2_USER@$EC2_HOST" \
            "rm -rf /tmp/amrit-deploy && mkdir -p /tmp/amrit-deploy"

          scp -i ~/.ssh/deploy_key -r dist/* \
            "$EC2_USER@$EC2_HOST:/tmp/amrit-deploy/"

      - name: Activate deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key "$EC2_USER@$EC2_HOST" << EOF
            set -e

            mkdir -p "$DEPLOY_PATH"
            rm -rf "$DEPLOY_PATH"/*
            cp -r /tmp/amrit-deploy/. "$DEPLOY_PATH"/
            rm -rf /tmp/amrit-deploy
          EOF